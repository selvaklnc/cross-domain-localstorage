<!DOCTYPE html>
<html>
<head>
  <title>Subdomain Storage Demo</title>
</head>
<body>

<h2>🔹 Subdomain Storage Demo</h2>

<input type="text" id="input" placeholder="Enter value" />
<button onclick="save()">Save</button>
<button onclick="load()">Load</button>
<button onclick="removeItem()">Remove</button>

<p id="output"></p>

<script src="../../dist/cross-storage.js"></script>

<script>
  const storage = new CrossStorage({
    iframeUrl: "https://storage.example.com/storage.html"
  });

  async function save() {
    const value = document.getElementById("input").value;

    await storage.set("demo_key", value);

    document.getElementById("output").innerText = "Saved: " + value;
  }

  async function load() {
    const value = await storage.get("demo_key");

    document.getElementById("output").innerText = "Loaded: " + value;
  }

  async function removeItem() {
    await storage.remove("demo_key");

    document.getElementById("output").innerText = "Removed";
  }
</script>

</body>
</html>
